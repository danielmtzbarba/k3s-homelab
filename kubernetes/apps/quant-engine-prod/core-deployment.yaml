apiVersion: apps/v1
kind: Deployment
metadata:
  name: quant-engine-prod-core
  namespace: quant-engine-mt5
  labels:
    app.kubernetes.io/name: quant-engine-prod-core
    app.kubernetes.io/part-of: quant-engine
    environment: prod
spec:
  replicas: 0
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: quant-engine-prod-core
  template:
    metadata:
      labels:
        app.kubernetes.io/name: quant-engine-prod-core
        app.kubernetes.io/part-of: quant-engine
        environment: prod
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: core-service
          image: ghcr.io/danielmtzbarba/core_service
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
          envFrom:
            - configMapRef:
                name: quant-engine-prod-core-config
            - secretRef:
                name: quant-engine-prod-core-secrets
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
