apiVersion: v1
kind: ConfigMap
metadata:
  name: quant-engine-dev-sync-config
  namespace: quant-engine-mt5
data:
  SYNC_MT5_SERVICE_URL: http://quant-engine-mt5-api:8000
  SYNC_CORE_SERVICE_URL: http://quant-engine-dev-core-service:8001
  SYNC_BACKEND_URL: http://quant-engine-dev-core-service:8001
  SYNC_MESSAGING_SERVICE_URL: http://quant-engine-dev-messaging-service:8003
  SYNC_INFLUX_URL: http://quant-engine-influxdb:8086
  SYNC_MT5_READY_TIMEOUT_SECONDS: "300"
  SYNC_POSITION_SYNC_INTERVAL_SECONDS: "30"
  SYNC_STRATEGY_CATALOG_SYNC_INTERVAL_SECONDS: "3600"
  SYNC_STRATEGY_SELECTION_REFRESH_SECONDS: "300"
  SYNC_STRATEGY_EXECUTION_MODE: LIVE
  SYNC_STRATEGY_ORDER_VOLUME: "0.01"
  SYNC_STRATEGY_MIN_RR: "1.5"
  SYNC_STRATEGY_TARGET_RR: "2.0"
  SYNC_STRATEGY_SL_BUFFER_ATR_MULTIPLIER: "0.2"
  SYNC_STRATEGY_TP_BUFFER_ATR_MULTIPLIER: "0.1"
  SYNC_STRATEGY_RISK_OVERLAY_ENABLED: "true"
  SYNC_STRATEGY_MAX_OPEN_POSITIONS: "3"
  SYNC_STRATEGY_MAX_POSITIONS_PER_SYMBOL: "1"
  SYNC_STRATEGY_MAX_SIGNAL_AGE_SECONDS: "900"
  SYNC_RECOVERY_BACKFILL_DAYS: "3"
