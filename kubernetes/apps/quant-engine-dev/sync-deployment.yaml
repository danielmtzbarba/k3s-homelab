apiVersion: apps/v1
kind: Deployment
metadata:
  name: quant-engine-dev-sync
  namespace: quant-engine-mt5
  labels:
    app.kubernetes.io/name: quant-engine-dev-sync
    app.kubernetes.io/part-of: quant-engine
    environment: dev
spec:
  replicas: 1
  strategy:
    type: Recreate
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: quant-engine-dev-sync
  template:
    metadata:
      labels:
        app.kubernetes.io/name: quant-engine-dev-sync
        app.kubernetes.io/part-of: quant-engine
        environment: dev
    spec:
      nodeSelector:
        homelab.danielmtz/workload-role: quant
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        - name: wait-for-influxdb
          image: busybox:1.36
          command:
            - sh
            - -c
            - until wget -qO- http://quant-engine-influxdb:8086/health; do sleep 5; done
      containers:
        - name: sync-service
          image: ghcr.io/danielmtzbarba/sync_service
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: quant-engine-dev-sync-config
            - secretRef:
                name: quant-engine-dev-sync-secrets
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
