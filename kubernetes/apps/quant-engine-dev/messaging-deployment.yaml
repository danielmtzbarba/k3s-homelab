apiVersion: apps/v1
kind: Deployment
metadata:
  name: quant-engine-dev-messaging
  namespace: quant-engine-mt5
  labels:
    app.kubernetes.io/name: quant-engine-dev-messaging
    app.kubernetes.io/part-of: quant-engine
    environment: dev
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: quant-engine-dev-messaging
  template:
    metadata:
      labels:
        app.kubernetes.io/name: quant-engine-dev-messaging
        app.kubernetes.io/part-of: quant-engine
        environment: dev
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: messaging-service
          image: ghcr.io/danielmtzbarba/messaging_service
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8003
          envFrom:
            - configMapRef:
                name: quant-engine-dev-messaging-config
            - secretRef:
                name: quant-engine-dev-messaging-secrets
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
