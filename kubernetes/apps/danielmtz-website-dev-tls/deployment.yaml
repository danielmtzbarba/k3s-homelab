apiVersion: apps/v1
kind: Deployment
metadata:
  name: danielmtz-website-dev
  namespace: danielmtz-website-dev
  labels:
    app.kubernetes.io/name: danielmtz-website-dev
spec:
  replicas: 1
  strategy:
    type: Recreate
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: danielmtz-website-dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: danielmtz-website-dev
    spec:
      nodeSelector:
        homelab.danielmtz/workload-role: web
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: web
          image: ghcr.io/danielmtzbarba/danielmtz-website
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
      securityContext:
        fsGroup: 101
