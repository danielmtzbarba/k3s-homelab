apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: quant-engine-mt5-secrets
  namespace: quant-engine-mt5
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-secret-manager
  target:
    name: quant-engine-mt5-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: k3s-quant-engine-mt5-env
