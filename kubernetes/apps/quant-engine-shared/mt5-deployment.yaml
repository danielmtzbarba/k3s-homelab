apiVersion: apps/v1
kind: Deployment
metadata:
  name: quant-engine-mt5-runtime
  namespace: quant-engine-mt5
  labels:
    app.kubernetes.io/name: quant-engine-mt5-runtime
    app.kubernetes.io/part-of: quant-engine
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: quant-engine-mt5-runtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: quant-engine-mt5-runtime
        app.kubernetes.io/part-of: quant-engine
    spec:
      nodeSelector:
        kubernetes.io/hostname: k3s-worker-1
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: mt5-service
          image: ghcr.io/danielmtzbarba/mt5_service
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
            - name: vnc
              containerPort: 5900
          envFrom:
            - configMapRef:
                name: quant-engine-mt5-config
            - secretRef:
                name: quant-engine-mt5-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
