apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: quant-engine-influxdb
  namespace: quant-engine-mt5
  labels:
    app.kubernetes.io/name: quant-engine-influxdb
    app.kubernetes.io/part-of: quant-engine
spec:
  serviceName: quant-engine-influxdb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: quant-engine-influxdb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: quant-engine-influxdb
        app.kubernetes.io/part-of: quant-engine
    spec:
      nodeSelector:
        homelab.danielmtz/workload-role: quant
      containers:
        - name: influxdb
          image: influxdb:2.7
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8086
          env:
            - name: DOCKER_INFLUXDB_INIT_MODE
              value: setup
          envFrom:
            - secretRef:
                name: quant-engine-influxdb-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/influxdb2
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
