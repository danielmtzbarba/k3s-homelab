apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: danielmtz-website-dev-updater
  namespace: argocd
spec:
  applicationRefs:
    - namePattern: "danielmtz-website-dev"
      images:
        - alias: "website"
          imageName: "ghcr.io/danielmtzbarba/danielmtz-website"
          commonUpdateSettings:
            updateStrategy: "newest-build"
            allowTags: "regexp:^[0-9a-f]{40}$"
            pullSecret: "pullsecret:argocd/ghcr-pull-secret"
      writeBackConfig:
        method: "git:secret:argocd/k3s-homelab-writeback"
        gitConfig:
          repository: "https://github.com/danielmtzbarba/k3s-homelab.git"
          branch: "main"
          writeBackTarget: "kustomization:/kubernetes/apps/danielmtz-website-dev-tls"
