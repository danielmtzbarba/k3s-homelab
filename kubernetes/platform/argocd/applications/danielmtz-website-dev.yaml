apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: danielmtz-website-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: danielmtz-website
    environment: dev
spec:
  project: default
  source:
    repoURL: git@github.com:danielmtzbarba/k3s-homelab.git
    targetRevision: main
    path: kubernetes/apps/danielmtz-website-dev-tls
  destination:
    server: https://kubernetes.default.svc
    namespace: danielmtz-website-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
