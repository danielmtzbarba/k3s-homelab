apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-loki
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: observability
    app.kubernetes.io/component: logs
spec:
  project: default
  source:
    repoURL: https://grafana-community.github.io/helm-charts
    chart: loki
    targetRevision: 6.57.0
    helm:
      releaseName: loki
      values: |
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          schemaConfig:
            configs:
              - from: "2024-04-01"
                store: tsdb
                object_store: s3
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h
          pattern_ingester:
            enabled: true
          limits_config:
            allow_structured_metadata: true
            volume_enabled: true
            retention_period: 168h
          ruler:
            enable_api: true

        deploymentMode: SingleBinary

        singleBinary:
          replicas: 1
          persistence:
            enabled: true
            size: 20Gi
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi

        gateway:
          service:
            type: ClusterIP

        chunksCache:
          enabled: false

        resultsCache:
          enabled: false

        minio:
          enabled: true

        backend:
          replicas: 0

        read:
          replicas: 0

        write:
          replicas: 0

        ingester:
          replicas: 0

        querier:
          replicas: 0

        queryFrontend:
          replicas: 0

        queryScheduler:
          replicas: 0

        distributor:
          replicas: 0

        compactor:
          replicas: 0

        indexGateway:
          replicas: 0

        bloomPlanner:
          replicas: 0

        bloomBuilder:
          replicas: 0

        bloomGateway:
          replicas: 0
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
