apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: quant-engine-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: quant-engine
    environment: dev
spec:
  project: default
  source:
    repoURL: git@github.com:danielmtzbarba/k3s-homelab.git
    targetRevision: main
    path: kubernetes/apps/quant-engine-dev
  destination:
    server: https://kubernetes.default.svc
    namespace: quant-engine-mt5
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
