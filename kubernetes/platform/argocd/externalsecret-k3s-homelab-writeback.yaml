apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: k3s-homelab-writeback
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-secret-manager
  target:
    name: k3s-homelab-writeback
    creationPolicy: Owner
    template:
      data:
        username: danielmtzbarba
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: k3s-homelab-writeback
