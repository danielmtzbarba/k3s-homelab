apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: platform-cluster-alerts
  namespace: observability
  labels:
    release: kube-prometheus-stack
    app.kubernetes.io/part-of: observability
    app.kubernetes.io/component: alerts
spec:
  groups:
    - name: platform.cluster.rules
      rules:
        - alert: NodeExporterDown
          expr: up{job="node-exporter"} == 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: Node exporter target is down
            description: >-
              Prometheus cannot scrape node exporter for instance {{ $labels.instance }}
              for more than 10 minutes.

        - alert: KubeNodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: Kubernetes node is not Ready
            description: >-
              Node {{ $labels.node }} has not been Ready for more than 10 minutes.

        - alert: KubeNodeMemoryPressure
          expr: kube_node_status_condition{condition="MemoryPressure",status="true"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Kubernetes node reports memory pressure
            description: >-
              Node {{ $labels.node }} is reporting MemoryPressure.

        - alert: KubeNodeDiskPressure
          expr: kube_node_status_condition{condition="DiskPressure",status="true"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Kubernetes node reports disk pressure
            description: >-
              Node {{ $labels.node }} is reporting DiskPressure.

        - alert: NodeFilesystemUsageHigh
          expr: |
            (
              1 - (
                node_filesystem_avail_bytes{job="node-exporter",mountpoint="/",fstype!~"tmpfs|overlay"}
                /
                node_filesystem_size_bytes{job="node-exporter",mountpoint="/",fstype!~"tmpfs|overlay"}
              )
            ) > 0.85
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: Root filesystem usage is high
            description: >-
              Root filesystem usage on {{ $labels.instance }} is above 85% for 15 minutes.

        - alert: NodeMemoryUsageHigh
          expr: |
            (
              1 - (
                node_memory_MemAvailable_bytes{job="node-exporter"}
                /
                node_memory_MemTotal_bytes{job="node-exporter"}
              )
            ) > 0.90
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: Node memory usage is high
            description: >-
              Memory usage on {{ $labels.instance }} is above 90% for 15 minutes.

        - alert: NodeCPUUsageHigh
          expr: |
            (
              1 - avg by (instance) (
                rate(node_cpu_seconds_total{job="node-exporter",mode="idle"}[5m])
              )
            ) > 0.90
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: Node CPU usage is high
            description: >-
              CPU usage on {{ $labels.instance }} is above 90% for 15 minutes.

        - alert: PodCrashLooping
          expr: sum by (namespace, pod, container) (increase(kube_pod_container_status_restarts_total[15m])) > 3
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Pod is restarting repeatedly
            description: >-
              Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }}
              restarted more than 3 times in the last 15 minutes.

        - alert: PodsNotRunning
          expr: sum by (namespace, phase) (kube_pod_status_phase{phase=~"Pending|Unknown|Failed"}) > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: Pods are stuck outside Running
            description: >-
              Namespace {{ $labels.namespace }} has pods in phase {{ $labels.phase }}
              for more than 15 minutes.
