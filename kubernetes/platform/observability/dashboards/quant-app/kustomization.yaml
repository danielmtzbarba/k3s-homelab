apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability

generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: observability
    app.kubernetes.io/component: dashboards
  annotations:
    grafana_folder: quant-app

configMapGenerator:
  - name: quant-engine-messaging-flow-dashboard
    files:
      - quant-engine-messaging-flow.json
  - name: quant-engine-system-overview-dashboard
    files:
      - quant-engine-system-overview.json
