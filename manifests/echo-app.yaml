apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: echo-app
  template:
    metadata:
      labels:
        app: echo-app
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: echo-app
                topologyKey: kubernetes.io/hostname
      containers:
        - name: echo-app
          image: hashicorp/http-echo:1.0.0
          args:
            - "-text=hello from k3s-homelab"
            - "-listen=:5678"
          ports:
            - containerPort: 5678
          readinessProbe:
            httpGet:
              path: /
              port: 5678
          livenessProbe:
            httpGet:
              path: /
              port: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: echo-app
  namespace: default
spec:
  selector:
    app: echo-app
  ports:
    - name: http
      port: 80
      targetPort: 5678
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: echo-app
  namespace: default
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /echo
            pathType: Prefix
            backend:
              service:
                name: echo-app
                port:
                  number: 80
